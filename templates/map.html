{% extends "base.html" %}

{% block title %}World Map{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  #map {
    width: 100%;
    height: calc(100vh - 120px);
    min-height: 500px;
    background: #1a1f2e;
  }
  .map-container {
    padding: 0;
    max-width: none;
  }
  .leaflet-container {
    background: #1a1f2e;
  }
  .map-header {
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .map-header h1 {
    margin: 0;
  }
  .coord-display {
    font-family: monospace;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 0.5rem 1rem;
    border-radius: 4px;
  }
</style>
{% endblock %}

{% block content %}
<div class="map-container">
  <header class="map-header">
    <h1>World Map</h1>
    <div class="coord-display" id="coords">Move mouse over map</div>
  </header>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Map dimensions (original image)
  const mapWidth = 4101;
  const mapHeight = 2048;
  const canvasSize = 8192;  // Padded to power of 2
  const maxZoom = 5;        // log2(8192/256) = 5

  // For Leaflet tiles to work correctly, we need coordinates
  // that map to tile indices 0..2^z at each zoom level.
  // At zoom 5, tiles cover 0-32 in each direction.
  // Our canvas is 8192px = 32 tiles * 256px.
  // So we use coordinates 0-32 as our "world" coordinates.

  const tilesAtMaxZoom = Math.pow(2, maxZoom);  // 32
  const scaleFactor = tilesAtMaxZoom;  // 1 unit = 1 tile at max zoom

  // Convert pixel coordinates to world coordinates
  const pxToWorld = (px) => px / 256;
  const worldToPx = (w) => w * 256;

  // Map bounds in world coordinates
  const worldMapWidth = pxToWorld(mapWidth);    // ~16.02
  const worldMapHeight = pxToWorld(mapHeight);  // 8
  const worldCanvasSize = pxToWorld(canvasSize); // 32

  // Standard CRS.Simple works for this
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: 0,
    maxZoom: maxZoom
  });

  // Standard tile layer - Leaflet will request tiles correctly now
  L.tileLayer('/map-tiles/{z}/{x}/{y}.png', {
    minZoom: 0,
    maxZoom: maxZoom,
    tileSize: 256,
    noWrap: true,
    bounds: [[0, 0], [worldCanvasSize, worldCanvasSize]]
  }).addTo(map);

  // Fit to the actual map (not full canvas) - in world coords
  // CRS.Simple: lat = -y, so we use negative bounds
  const mapBounds = [[-worldMapHeight, 0], [0, worldMapWidth]];
  map.fitBounds(mapBounds);
  map.setMaxBounds(L.latLngBounds(mapBounds).pad(0.3));

  // Coordinates display - convert back to pixels
  const coordDisplay = document.getElementById('coords');
  map.on('mousemove', function(e) {
    const x = Math.round(e.latlng.lng * 256);
    const y = Math.round(-e.latlng.lat * 256);  // Flip Y back
    if (x >= 0 && x <= mapWidth && y >= 0 && y <= mapHeight) {
      coordDisplay.textContent = `X: ${x}, Y: ${y}`;
    } else {
      coordDisplay.textContent = 'Outside map';
    }
  });
</script>
{% endblock %}

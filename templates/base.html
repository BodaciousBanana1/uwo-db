<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-text">Ivyro</span>
      <span class="logo-version">MK · II</span>
    </div>
    <div class="logo-subtitle">ADMIRALTY CONSOLE</div>
    
    <nav class="nav">
      <div class="nav-section">BROWSE</div>
      <a href="/" class="nav-item {% if current_path == '/' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg> Home
      </a>
      <a href="/ships" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v18"/><path d="M12 5l8 10H4z" fill="currentColor" opacity="0.3"/><path d="M12 5l8 10H4z"/><path d="M3 21h18"/></svg> Ships
      </a>
      <a href="/cities" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/><path d="M9 9h.01"/><path d="M15 9h.01"/><path d="M9 13h.01"/><path d="M15 13h.01"/></svg> Cities
      </a>
      <a href="/quests" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Quests
      </a>
      <a href="/maps" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg> Archive Maps
      </a>
      <a href="/skills" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Skills
      </a>

      <div class="nav-section">TOOLS</div>
      <a href="/tools/adventurer-search" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6"/><path d="M8 11h6"/></svg> Adventurer Search
      </a>
      {#
      <a href="/discoveries" class="nav-item">
        <span class="nav-icon">◎</span> Discoveries
      </a>
      <a href="/items" class="nav-item">
        <span class="nav-icon">☐</span> Items
      </a>
      <a href="/recipes" class="nav-item">
        <span class="nav-icon">✎</span> Recipes
      </a>
      <a href="/skills" class="nav-item">
        <span class="nav-icon">▣</span> Skills
      </a>
      <a href="/map" class="nav-item">
        <span class="nav-icon">◯</span> Map
      </a>
      #}
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div class="search-mini">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder='Search everything — try "sextant", "coral atoll", "Athens"...'>
        <span class="kbd">⌘K</span>
      </div>
      <div class="header-right">
        <span class="lang-switch">EN / JP / KR</span>
        <span class="stats-mini">● {{ config.extra.entry_count | default(value=1217) }} entries</span>
      </div>
    </header>

    {% block content %}{% endblock %}
  </main>

  <script src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-text">Ivyro</span>
      <span class="logo-version">MK · II</span>
    </div>
    <div class="logo-subtitle">ADMIRALTY CONSOLE</div>
    
    <nav class="nav">
      <div class="nav-section">BROWSE</div>
      <a href="/" class="nav-item {% if current_path == '/' %}active{% endif %}">
        <span class="nav-icon">↓</span> Home
      </a>
      <a href="/discoveries" class="nav-item">
        <span class="nav-icon">◎</span> Discoveries
      </a>
      <a href="/items" class="nav-item">
        <span class="nav-icon">☐</span> Items
      </a>
      <a href="/recipes" class="nav-item">
        <span class="nav-icon">✎</span> Recipes
      </a>
      <a href="/skills" class="nav-item">
        <span class="nav-icon">▣</span> Skills
      </a>
      <a href="/map" class="nav-item">
        <span class="nav-icon">◯</span> Map
      </a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div class="search-mini">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder='Search everything — try "sextant", "coral atoll", "Athens"...'>
        <span class="kbd">⌘K</span>
      </div>
      <div class="header-right">
        <span class="lang-switch">EN / JP / KR</span>
        <span class="stats-mini">● {{ config.extra.entry_count | default(value=1217) }} entries</span>
      </div>
    </header>

    {% block content %}{% endblock %}
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
